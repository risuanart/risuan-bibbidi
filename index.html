<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日宣bibbidi設計台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Noto+Serif+TC:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+JP&family=Noto+Sans+KR&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <!-- 左側欄：標題、簡介、分類、圖案選單 -->
  <aside class="sidebar">
    <h1>日宣bibbidi設計台</h1>
    <p>請在拼貼完成後，將成品傳輸給我們，我們將協助準備課前所需的材料</p>

    <div class="tabs-wrap" id="tabsWrap">
      <button class="tabs-toggle" id="tabsToggle" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span id="tabsToggleLabel"></span>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="hangul-composer" id="hangulComposer" style="display:none;">
      <div class="hangul-composer-row">
        <select id="choSelect" class="hangul-select"></select>
        <select id="jungSelect" class="hangul-select"></select>
        <select id="jongSelect" class="hangul-select"></select>
      </div>
      <button class="icon-btn hangul-preview-btn" id="hangulPreviewBtn">
        <span class="icon-preview" id="hangulPreview"></span>
        <span class="glyph-label" id="hangulPreviewLabel">組成後點此使用</span>
      </button>
    </div>
    <div class="icon-grid" id="iconGrid"></div>
    <input type="file" id="imageUploadInput" accept="image/*" style="display:none">
  </aside>

  <!-- 右側：畫布工具列 + 格子畫布 -->
  <main class="canvas-area">
    <div class="size-orientation-group">
      <div class="toolbar-row" id="sizeOptions"></div>
      <div class="toolbar-row" id="orientationRow">
        <div id="orientationOptions" style="display:flex;gap:8px;"></div>

       <div class="zoom-control">
         <button class="action-btn" id="zoomOutBtn">－</button>
         <span id="zoomLabel" style="font-size:13px;width:44px;text-align:center">100%</span>
         <button class="action-btn" id="zoomInBtn">＋</button>
       </div>
      </div>
    </div>
    <div class="toolbar-row">
     <span class="current-price-label" id="currentPriceLabel"></span>
    </div>
    <div class="toolbar-row">
     <button class="action-btn eraser-default" id="eraserBtn" style="margin-left:0">單格去除</button>
     <button class="action-btn danger-soft" id="clearBtn" style="margin-left:0">清空畫布</button>
     <button class="action-btn primary" id="exportBtn" style="margin-left:0">輸出圖檔</button>
    </div>
    <div class="grid-wrapper">
      <div class="zoom-viewport" id="zoomViewport">
        <div class="stitch-grid" id="stitchGrid"></div>
      </div>
      <div class="item-toolbar" id="itemToolbar">
<div class="toolbar-actions">
<button id="flipHBtn" title="水平翻轉(左右)"><svg class="flip-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M8 7l-5 5 5 5"/><path d="M16 7l5 5-5 5"/></svg></button>
<button id="flipVBtn" title="垂直翻轉(上下)"><svg class="flip-icon flip-icon-vertical" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M8 7l-5 5 5 5"/><path d="M16 7l5 5-5 5"/></svg></button>
<button id="resizeItemBtn" title="調整解析度" style="display:none;"><svg class="flip-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
<button id="deleteItemBtn" class="danger" title="刪除這個圖案"><svg class="flip-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
</div>
<div class="nudge-pad" title="微調位置">
<button id="nudgeUpBtn" class="nudge-up" title="上移一格"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M6 11l6-6 6 6"/></svg></button>
<button id="nudgeLeftBtn" class="nudge-left" title="左移一格"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 6l-6 6 6 6"/></svg></button>
<button id="nudgeRightBtn" class="nudge-right" title="右移一格"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></button>
<button id="nudgeDownBtn" class="nudge-down" title="下移一格"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M18 13l-6 6-6-6"/></svg></button>
</div>
</div>
      <div class="selection-frame" id="selectionFrame"></div>
    </div>
  </main>
</div>

<button class="help-btn" title="使用說明">?</button>

<div class="help-overlay" id="resPickerOverlay">
  <div class="help-card">
    <button class="help-close" id="resPickerCloseBtn" title="關閉">✕</button>
    <h3 class="help-title" style="text-align:center;margin-top:0;">選擇解析度</h3>
    <div class="res-preview-wrap">
      <canvas id="resPreviewCanvas" width="180" height="180"></canvas>
    </div>
    <div class="res-slider-row">
      <input type="range" id="resSlider" min="8" max="40" value="20">
      <span id="resSliderLabel">20 x 20 格</span>
    </div>
    <p class="help-desc" style="text-align:center;">格數越多，圖片細節越多，但佔用的畫布範圍也會變大；格數越少，形狀越簡化。</p>
    <button class="action-btn primary" id="resConfirmBtn" style="width:100%;margin-left:0;">使用這個解析度</button>
  </div>
</div>

<div class="help-overlay" id="helpOverlay">
  <div class="help-card">
    <button class="help-close" id="helpCloseBtn" title="關閉">✕</button>
    <div class="help-icon" id="helpIcon"></div>
    <h3 class="help-title" id="helpTitle"></h3>
    <p class="help-desc" id="helpDesc"></p>
    <div class="help-nav">
      <span class="help-step-label" id="helpStepLabel"></span>
      <div class="help-nav-arrows">
        <button class="help-nav-btn" id="helpPrevBtn" title="上一步" aria-label="Previous"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button class="help-nav-btn" id="helpNextBtn" title="下一步" aria-label="Next"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
    </div>
  </div>
</div>

<div class="help-overlay" id="confirmClearOverlay">
  <div class="help-card">
    <h3 class="help-title" style="text-align:center;margin-top:0;">確定要清空畫布嗎？</h3>
    <p class="help-desc" style="text-align:center;">清空後將無法復原，已排版的內容會全部消失</p>
    <div class="confirm-actions">
      <button class="action-btn" id="confirmClearCancelBtn" style="margin-left:0;">取消</button>
      <button class="action-btn danger" id="confirmClearOkBtn" style="margin-left:0;">確定清空</button>
    </div>
  </div>
</div>

<div class="help-overlay" id="hangulWarnOverlay">
  <div class="help-card">
    <h3 class="help-title" style="text-align:center;margin-top:0;">這個組合不是真實存在的韓文字</h3>
    <p class="help-desc" style="text-align:center;">這個組合不是真實存在的韓文字，確定要使用嗎？</p>
    <div class="confirm-actions">
      <button class="action-btn" id="hangulWarnEditBtn" style="margin-left:0;">修改</button>
      <button class="action-btn primary" id="hangulWarnUseBtn" style="margin-left:0;">確定使用</button>
    </div>
  </div>
</div>

<div class="help-overlay" id="exportFormOverlay">
  <div class="help-card">
    <h3 class="help-title" style="text-align:center;margin-top:0;">填寫預約資訊</h3>
    <p class="help-desc" style="text-align:center;">請填寫以下資訊，才能輸出圖檔，方便我們依時段整理收件</p>
    <div class="export-form-fields">
      <div class="export-field">
        <label for="exportDate">預約課程日期</label>
        <input type="date" id="exportDate" class="export-input">
      </div>
      <div class="export-field">
        <label for="exportTime">預約課程時間</label>
        <select id="exportTime" class="export-input">
          <option value="" selected>請選擇時段</option>
          <option value="10:00">10:00</option>
          <option value="14:00">14:00</option>
        </select>
      </div>
      <div class="export-field">
        <label for="exportName">預約姓名</label>
        <input type="text" id="exportName" class="export-input" placeholder="請輸入姓名">
      </div>
      <div class="export-field">
        <label for="exportOperator">實際操作者稱呼（選填）</label>
        <input type="text" id="exportOperator" class="export-input" placeholder="若非本人操作可填寫">
        <span class="export-field-hint">若非本人操作，請填寫實際排版的人，方便老師辨識檔案</span>
      </div>
    </div>
    <span id="exportError" class="export-error"></span>
    <div class="confirm-actions">
      <button class="action-btn" id="exportFormCancelBtn" style="margin-left:0;">取消</button>
      <button class="action-btn primary" id="exportFormConfirmBtn" style="margin-left:0;" disabled>確定並輸出</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/bitmap.js"></script>
<script src="js/canvas.js"></script>
<script src="js/ui.js"></script>
<script src="js/save.js"></script>
<script src="js/main.js"></script>
</body>
</html>
